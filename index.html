            const hResizer = document.getElementById('horizontal-resizer'), seatingResizer = document.getElementById('seating-resizer');

            if (seatingResizer) {
                const handleSeatingMouseMove = (e) => {
                    if (!isSeatingResizing) return;
                    const event = e.touches ? e.touches[0] : e;
                    let newHeight = event.clientY - seatingPanel.getBoundingClientRect().top;
                    newHeight = Math.max(120, Math.min(newHeight, window.innerHeight * 0.75));
                    seatingPanel.style.maxHeight = 'none'; seatingPanel.style.height = `${newHeight}px`; seatingPanel.style.flexBasis = `${newHeight}px`;
                };
                const stopSeatingResizing = () => { isSeatingResizing = false; seatingResizer.classList.remove('resizing'); document.removeEventListener('mousemove', handleSeatingMouseMove); document.removeEventListener('mouseup', stopSeatingResizing); document.removeEventListener('touchmove', handleSeatingMouseMove); document.removeEventListener('touchend', stopSeatingResizing); };
                seatingResizer.addEventListener('mousedown', (e) => { e.preventDefault(); isSeatingResizing = true; seatingResizer.classList.add('resizing'); document.addEventListener('mousemove', handleSeatingMouseMove); document.addEventListener('mouseup', stopSeatingResizing); });
                seatingResizer.addEventListener('touchstart', (e) => { e.preventDefault(); isSeatingResizing = true; seatingResizer.classList.add('resizing'); document.addEventListener('touchmove', handleSeatingMouseMove, { passive: false }); document.addEventListener('touchend', stopSeatingResizing); }, { passive: false });
            }

            if (hResizer) {
                const handleHMouseMove = (e) => {
                    if (!isHResizing) return;
                    const event = e.touches ? e.touches[0] : e;
                    let newTopHeight = event.clientY - document.getElementById('main-container').getBoundingClientRect().top;
                    newTopHeight = Math.max(80, Math.min(newTopHeight, document.getElementById('main-container').getBoundingClientRect().height - 120));
                    leftPanel.style.height = `${newTopHeight}px`; leftPanel.style.flexBasis = `${newTopHeight}px`; leftPanel.style.flexGrow = '0'; leftPanel.style.flexShrink = '0';
                };
                const stopHResizing = () => { isHResizing = false; hResizer.classList.remove('resizing'); document.removeEventListener('mousemove', handleHMouseMove); document.removeEventListener('mouseup', stopHResizing); document.removeEventListener('touchmove', handleHMouseMove); document.removeEventListener('touchend', stopHResizing); };
                hResizer.addEventListener('mousedown', (e) => { e.preventDefault(); isHResizing = true; hResizer.classList.add('resizing'); document.addEventListener('mousemove', handleHMouseMove); document.addEventListener('mouseup', stopHResizing); });
                hResizer.addEventListener('touchstart', (e) => { e.preventDefault(); isHResizing = true; hResizer.classList.add('resizing'); document.addEventListener('touchmove', handleHMouseMove, { passive: false }); document.addEventListener('touchend', stopHResizing); }, { passive: false });
            }

            if (resizer) {
                const handleMouseMove = (e) => {
                    if (!isResizing) return;
                    const event = e.touches ? e.touches[0] : e;
                    let newLeftWidth = event.clientX - document.getElementById('main-container').getBoundingClientRect().left;
                    newLeftWidth = Math.max(80, Math.min(newLeftWidth, document.getElementById('main-container').getBoundingClientRect().width - 80 - resizer.offsetWidth));
                    leftPanel.style.flexBasis = `${newLeftWidth}px`; leftPanel.style.flexGrow = '0'; leftPanel.style.flexShrink = '0';
                };
                const stopResizing = () => { isResizing = false; resizer.classList.remove('resizing'); document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', stopResizing); document.removeEventListener('touchmove', handleMouseMove); document.removeEventListener('touchend', stopResizing); };
                resizer.addEventListener('mousedown', (e) => { e.preventDefault(); isResizing = true; resizer.classList.add('resizing'); document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', stopResizing); });
                resizer.addEventListener('touchstart', (e) => { e.preventDefault(); isResizing = true; resizer.classList.add('resizing'); document.addEventListener('touchmove', handleMouseMove); document.addEventListener('touchend', stopResizing); });
            }

            if (addParticipantBtn) {
                addParticipantBtn.addEventListener('click', () => { participants.push({ id: nextId++, name: `ผู้มาชี้แจง ${nextId}` }); renderParticipants(); markUnsaved(); debouncedSave(); });
            }
            if (bulkAddBtn) {
                bulkAddBtn.addEventListener('click', () => { if (toolsDropdown) toolsDropdown.classList.add('hidden'); if (bulkAddTextarea) bulkAddTextarea.value = ''; bulkAddModal.classList.remove('hidden'); bulkAddTextarea.focus(); });
            }
            if (bulkAddConfirmBtn) {
                bulkAddConfirmBtn.addEventListener('click', () => {
                    const names = bulkAddTextarea.value.split('\n').map(n => n.trim()).filter(n => n);
                    if (names.length === 0) { showToast("No names entered", "info"); return; }
                    let addedCount = 0; names.forEach(name => { participants.push({ id: nextId++, name }); addedCount++; });
                    renderParticipants(); markUnsaved(); debouncedSave(); hideAllModals(); showToast(`Added ${addedCount} participants`, "success");
                });
            }
            if (importExcelBtn) {
                importExcelBtn.addEventListener('click', () => excelInput.click());
            }
            if (excelInput) {
                excelInput.addEventListener('change', (e) => {
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const data = new Uint8Array(event.target.result);
                        try {
                            const workbook = XLSX.read(data, { type: 'array' });
                            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                            let addedCount = 0;
                            if (jsonData && jsonData.length > 0) {
                                jsonData.forEach(row => { if (row.length > 0 && row[0]) { participants.push({ id: nextId++, name: String(row[0]).trim() }); addedCount++; } });
                                if (addedCount > 0) { renderParticipants(); markUnsaved(); debouncedSave(); showToast(`Imported ${addedCount} members`, "success"); } 
                                else showToast("No names found", "info");
                            } else showToast("File is empty", "info");
                        } catch (error) { showToast("Import error", "error"); }
                        excelInput.value = ''; 
                    }; reader.readAsArrayBuffer(file);
                });
            }

            if (increaseColsBtn) {
                increaseColsBtn.addEventListener('click', () => { if (columnCount < 10) { updateColumnLayout(columnCount + 1); markUnsaved(); debouncedSave(); }});
            }
            if (decreaseColsBtn) {
                decreaseColsBtn.addEventListener('click', () => { if (columnCount > 1) { updateColumnLayout(columnCount - 1); markUnsaved(); debouncedSave(); }});
            }
            
            if (downloadBtn) {
                downloadBtn.addEventListener('click', () => {
                    const text = transcriptTextarea.value; if (text.trim() === '') { showToast('Nothing to download', "info"); return; }
                    const sourceHTML = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Meeting Notes</title></head><body><pre>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;').replace(/\t/g, '&#9;')}</pre></body></html>`;
                    const fileDownload = document.createElement("a"); document.body.appendChild(fileDownload);
                    fileDownload.href = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML); fileDownload.download = `meeting-notes-${new Date().toISOString().slice(0,10)}.doc`; fileDownload.click(); document.body.removeChild(fileDownload); showToast("Downloading Word doc...", "success");
                });
            }
            
            if (copyAllBtn) {
                copyAllBtn.addEventListener('click', () => {
                    const textAreaFallback = document.createElement("textarea"); textAreaFallback.value = transcriptTextarea.value; document.body.appendChild(textAreaFallback); textAreaFallback.select();
                    try { document.execCommand('copy'); showToast('Copied to clipboard', 'success'); } catch (err) { showToast('Copy failed', 'error'); }
                    document.body.removeChild(textAreaFallback);
                });
            }

            if (copyNamesBtn) {
                copyNamesBtn.addEventListener('click', () => {
                    const namesList = participants.map(p => p.name).join('\n');
                    if(!namesList) { showToast('ไม่มีรายชื่อ', 'info'); return; }
                    const textArea = document.createElement("textarea");
                    textArea.value = namesList; document.body.appendChild(textArea); textArea.select();
                    try { document.execCommand('copy'); showToast('คัดลอกรายชื่อแล้ว', 'success'); }
                    catch (err) { showToast('คัดลอกไม่สำเร็จ', 'error'); }
                    document.body.removeChild(textArea);
                });
            }

            if (ratioToggleBtn) {
                ratioToggleBtn.addEventListener('click', () => {
                    currentRatioIndex = (currentRatioIndex + 1) % ratios.length; const newRatio = ratios[currentRatioIndex]; ratioToggleBtn.textContent = newRatio.toUpperCase();
                    appContainer.classList.remove('ratio-mode', 'ratio-16-9', 'ratio-4-3', 'h-screen'); document.body.classList.remove('has-ratio');
                    if (newRatio === 'Auto') { appContainer.classList.add('h-screen'); showToast("Auto Ratio (Full Screen)"); }
                    else { appContainer.classList.add('ratio-mode'); document.body.classList.add('has-ratio'); appContainer.classList.add(newRatio === '16:9' ? 'ratio-16-9' : 'ratio-4-3'); showToast(`${newRatio} Aspect Ratio`); }
                });
            }
            if (themeToggle) {
                themeToggle.addEventListener('click', () => { document.body.classList.toggle('dark'); document.getElementById('theme-icon-light').classList.toggle('hidden'); document.getElementById('theme-icon-dark').classList.toggle('hidden'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });
                if (localStorage.getItem('theme') === 'light') { document.body.classList.remove('dark'); document.getElementById('theme-icon-light').classList.remove('hidden'); document.getElementById('theme-icon-dark').classList.add('hidden'); }
            }
            
            if (timestampBtn) {
                timestampBtn.addEventListener('click', insertTimestamp);
            }
            function insertTimestamp() {
                if (isInterimActive) { transcriptTextarea.value = sttStableText; isInterimActive = false; }
                saveToHistory(transcriptTextarea.value); 
                const now = new Date(), timeString = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}] `;
                const start = transcriptTextarea.selectionStart, end = transcriptTextarea.selectionEnd;
                transcriptTextarea.value = transcriptTextarea.value.substring(0, start) + timeString + transcriptTextarea.value.substring(end);
                sttStableText = transcriptTextarea.value; saveToHistory(transcriptTextarea.value);
                transcriptTextarea.selectionStart = transcriptTextarea.selectionEnd = start + timeString.length; transcriptTextarea.focus(); 
                markUnsaved(); debouncedSave(); 
            }
            
            if (toolsMenuBtn) {
                toolsMenuBtn.addEventListener('click', (e) => { e.stopPropagation(); toolsDropdown.classList.toggle('hidden'); });
            }
            document.addEventListener('click', (e) => { if (toolsDropdown && !toolsDropdown.classList.contains('hidden') && !toolsDropdown.contains(e.target) && !toolsMenuBtn.contains(e.target)) toolsDropdown.classList.add('hidden'); });
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey) {
                    if (e.key === 's') { e.preventDefault(); saveStateToFirestore(); } else if (e.key === 't') { e.preventDefault(); insertTimestamp(); } else if (e.key === 'z') { e.preventDefault(); undoBtn.click(); } else if (e.key === 'y') { e.preventDefault(); redoBtn.click(); } else if (e.key === 'k') { e.preventDefault(); openSearchModal(); }
                    else if (!isNaN(parseInt(e.key)) && e.key >= '1' && e.key <= '9') { e.preventDefault(); const pIndex = parseInt(e.key) - 1; if (participants && participants[pIndex]) handleParticipantSelect(participants[pIndex].id); }
                } else if (e.key === '/' && document.activeElement !== transcriptTextarea && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') { e.preventDefault(); openSearchModal(); }
            });

            function openSearchModal() { document.getElementById('search-modal').classList.remove('hidden'); document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = ''; document.getElementById('search-input').focus(); renderSearchResults(''); }
            function renderSearchResults(term) {
                const results = document.getElementById('search-results'); results.innerHTML = '';
                const matches = term ? allNamesCache.filter(n => n.toLowerCase().includes(term.toLowerCase())) : allNamesCache;
                if (!matches.length) { results.innerHTML = `<p style="font-size:0.75rem;color:var(--text-secondary);text-align:center;padding:0.5rem;">ไม่พบชื่อ</p>`; return; }
                matches.slice(0, 20).forEach(name => {
                    const item = document.createElement('div'); item.textContent = name; item.style.cssText = 'padding:0.6rem 0.75rem;cursor:pointer;font-size:0.82rem;border:1px solid var(--border-color);border-radius:0.4rem;transition:all 0.15s;';
                    item.addEventListener('mouseover', () => item.style.borderColor = 'var(--text-secondary)'); item.addEventListener('mouseout', () => item.style.borderColor = 'var(--border-color)');
                    item.addEventListener('click', () => {
                        if (participants.find(p => p.name === name)) showToast(`"${name}" มีอยู่แล้ว`, 'info');
                        else { participants.push({ id: nextId++, name }); renderParticipants(); markUnsaved(); debouncedSave(); showToast(`เพิ่ม "${name}" แล้ว`, 'success'); }
                        document.getElementById('search-modal').classList.add('hidden');
                    }); results.appendChild(item);
                });
            }
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', function() { renderSearchResults(this.value.trim()); });
            }

            setInterval(() => {
                if (clockDiv) {
                    const now = new Date(); clockDiv.textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                }
                const elapsed = Date.now() - meetingStartTime, h = Math.floor(elapsed / 3600000).toString().padStart(2, '0'), m = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0'), s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                const durationTimer = document.getElementById('duration-timer');
                if (durationTimer) durationTimer.textContent = `${h}:${m}:${s}`;
            }, 1000);

            document.querySelectorAll('.modal-close').forEach(btn => btn.addEventListener('click', hideAllModals));
            allModals.forEach(modal => modal.addEventListener('click', (e) => { if(e.target === modal) hideAllModals(); }));
            editNameCancelBtn.addEventListener('click', hideAllModals); saveListCancelBtn.addEventListener('click', hideAllModals); loadListCancelBtn.addEventListener('click', hideAllModals); confirmCancelBtn.addEventListener('click', hideAllModals); bulkAddCancelBtn.addEventListener('click', hideAllModals); document.getElementById('history-close-btn').addEventListener('click', hideAllModals);

            async function saveCurrentMeetingToHistory(title) {
                if (!transcriptTextarea.value.trim() && participants.length === 0) return;
                if (!userId) return;
                try {
                    const historyRef = collection(db, getBasePath(userId), 'meeting_history');
                    const saveData = {
                        title: title || `การประชุม ${new Date().toLocaleDateString('th-TH')}`,
                        transcript: transcriptTextarea.value,
                        participants: participants,
                        savedAt: serverTimestamp(),
                        createdAt: currentRoomId ? undefined : new Date().toISOString()
                    };

                    if (currentRoomId) {
                        const roomRef = doc(db, getBasePath(userId), 'meeting_history', currentRoomId);
                        await updateDoc(roomRef, {
                            title: saveData.title,
                            transcript: saveData.transcript,
                            participants: saveData.participants,
                            savedAt: serverTimestamp()
                        });
                    } else {
                        const docRef = await addDoc(historyRef, {
                            ...saveData,
                            createdAt: new Date().toISOString()
                        });
                        currentRoomId = docRef.id;
                    }
                } catch(e) { 
                    console.error('Save history error:', e);
                    showToast('บันทึกไม่สำเร็จ', 'error'); 
                }
            }

            const saveMeetingBtn = document.getElementById('save-meeting-btn');
            if (saveMeetingBtn) {
                saveMeetingBtn.addEventListener('click', async () => { 
                    if (toolsDropdown) toolsDropdown.classList.add('hidden'); 
                    if (!transcriptTextarea.value.trim() && participants.length === 0) { showToast('ไม่มีข้อมูลให้บันทึก', 'info'); return; } 
                    const currentTitle = document.getElementById('meeting-title')?.textContent || 'Meeting Notes'; 
                    await saveCurrentMeetingToHistory(currentTitle); 
                    showToast(`บันทึก "${currentTitle}" แล้ว`, 'success'); 
                });
            }
            
            if (clearTextBtn) {
                clearTextBtn.addEventListener('click', () => {
                    if (transcriptTextarea.value.trim() === '') { showToast("Transcript is already empty", "info"); return; }
                    confirmTitle.textContent = "Clear Transcript"; confirmMessage.textContent = "Delete all text in the transcript? You can Undo this action.";
                    confirmOkBtn.onclick = () => { 
                        isInterimActive = false; transcriptTextarea.value = ''; sttStableText = ''; 
                        saveToHistory(''); markUnsaved(); debouncedSave(); hideAllModals(); showToast("Transcript cleared", "success"); 
                    };
                    confirmModal.classList.remove('hidden');
                });
            }

            const newMeetingBtn = document.getElementById('new-meeting-btn');
            if (newMeetingBtn) {
                newMeetingBtn.addEventListener('click', () => {
                    if (toolsDropdown) toolsDropdown.classList.add('hidden'); 
                    
                    if (hasUnsavedChanges) {
                        confirmTitle.textContent = "Unsaved Changes!"; 
                        confirmMessage.textContent = "คุณยังมีข้อมูลที่ยังไม่ได้เซฟ ต้องการเริ่มห้องใหม่และทิ้งข้อมูลเดิมหรือไม่?";
                    } else {
                        confirmTitle.textContent = "New Meeting"; 
                        confirmMessage.textContent = "Start a new meeting? The current board will be cleared.";
                    }
                    
                    confirmOkBtn.onclick = () => { 
                        transcriptTextarea.value = ''; sttStableText = ''; isInterimActive = false; 
                        participants = [ { id: 1, name: 'ประธาน' }, { id: 2, name: 'เลขานุการ' }, { id: 3, name: 'เจ้าหน้าที่ฝ่ายเลขานุการ' }, { id: 4, name: 'ผู้ชี้แจง' } ]; 
                        activeParticipantId = null; nextId = 5; textHistory = []; historyIndex = -1; 
                        updateUndoRedoButtons(); renderParticipants(); 
                        const titleEl = document.getElementById('meeting-title'); if (titleEl && titleEl.tagName === 'H1') titleEl.textContent = 'Meeting Notes'; 
                        meetingStartTime = Date.now(); currentRoomId = null; 
                        
                        hasUnsavedChanges = false; 
                        saveStateToFirestore(); 
                        hideAllModals(); showToast(`เริ่มการประชุมใหม่`, 'success'); 
                    };
                    confirmModal.classList.remove('hidden');
                });
            }

            const historyBtn = document.getElementById('history-btn');
            if (historyBtn) {
                historyBtn.addEventListener('click', async () => {
                    if (toolsDropdown) toolsDropdown.classList.add('hidden'); 
                    if (historyModal) historyModal.classList.remove('hidden'); 
                    const container = document.getElementById('history-list-container'); 
                    if (container) container.innerHTML = '<p class="text-center text-gray-500 text-sm font-mono">Loading...</p>';
                    if (!userId) return;
                    try {
                        const snap = await getDocs(query(collection(db, getBasePath(userId), 'meeting_history'), orderBy('savedAt', 'desc')));
                        if (container) {
                            container.innerHTML = '';
                            if (snap.empty) { container.innerHTML = '<p class="text-center text-gray-500 text-sm font-mono">ยังไม่มีประวัติการประชุม</p>'; return; }
                            snap.forEach(d => {
                                const data = d.data(), docId = d.id, date = data.createdAt ? new Date(data.createdAt).toLocaleDateString('th-TH', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'ไม่ทราบวันที่';
                                const item = document.createElement('div'); item.className = 'saved-list-item rounded-lg p-4 cursor-pointer'; item.style.cssText = 'border:1px solid var(--border-color);background:var(--bg-panel-solid);';
                                item.innerHTML = `<div class="flex justify-between items-start gap-3"><div class="flex-grow min-w-0"><p class="font-bold text-sm uppercase tracking-wide truncate">${data.title || 'ไม่มีชื่อ'}</p><p class="text-xs mt-1" style="color:var(--text-secondary);">${date}</p><p class="text-xs mt-1 font-mono truncate" style="color:var(--text-secondary);">${data.participants?.length || 0} คน · ${data.transcript?.length || 0} ตัวอักษร</p></div><div class="flex gap-2 flex-shrink-0"><button class="load-history-btn tool-btn text-xs px-2 py-1" style="height:auto;">LOAD</button><button class="delete-history-btn tool-btn text-xs px-2 py-1 text-red-400" style="height:auto;">DEL</button></div></div>`;
                                item.querySelector('.load-history-btn').addEventListener('click', (e) => { 
                                    e.stopPropagation(); 
                                    confirmTitle.textContent = 'Load Meeting'; confirmMessage.textContent = `โหลด "${data.title}" กลับมา? ข้อมูลปัจจุบันจะถูกแทนที่`; 
                                    confirmOkBtn.onclick = async () => { 
                                        transcriptTextarea.value = data.transcript || ''; sttStableText = transcriptTextarea.value; isInterimActive = false; 
                                        participants = JSON.parse(JSON.stringify(data.participants || [])); nextId = participants.reduce((m,p) => p.id>m?p.id:m, 0) + 1; 
                                        textHistory = []; historyIndex = -1; saveToHistory(transcriptTextarea.value); renderParticipants(); 
                                        const titleEl = document.getElementById('meeting-title'); if (titleEl && titleEl.tagName === 'H1') titleEl.textContent = data.title; 
                                        currentRoomId = docId; 
                                        hasUnsavedChanges = false;
                                        await saveStateToFirestore(); 
                                        hideAllModals(); showToast(`โหลด "${data.title}" แล้ว`, 'success'); 
                                    }; 
                                    confirmModal.classList.remove('hidden'); 
                                });
                                item.querySelector('.delete-history-btn').addEventListener('click', (e) => { 
                                    e.stopPropagation(); confirmTitle.textContent = "Delete History"; confirmMessage.textContent = `ลบ "${data.title}" ออกจากประวัติ?`; 
                                    confirmOkBtn.onclick = async () => { 
                                        try { await deleteDoc(doc(db, getBasePath(userId), 'meeting_history', docId)); item.remove(); if (container.children.length === 0) container.innerHTML = '<p class="text-center text-gray-500 text-sm font-mono">ยังไม่มีประวัติการประชุม</p>'; showToast('ลบแล้ว', 'success'); hideAllModals(); if(currentRoomId === docId) currentRoomId = null; } 
                                        catch(err) { showToast('ลบไม่สำเร็จ', 'error'); } 
                                    }; 
                                    confirmModal.classList.remove('hidden'); 
                                });
                                container.appendChild(item);
                            });
                        }
                    } catch(e) { if (container) container.innerHTML = '<p class="text-center text-red-500 text-sm">โหลดไม่สำเร็จ</p>'; }
                });
            }
        });
    </script>
</body>
</html>
